# 复制到 Java 服务仓库的 .github/workflows/ci.yml
# 适用：awsome-shop-auth-service / -product-service / -points-service / -order-service / -api-gateway
name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"   # 按项目实际改（17 / 21）
          cache: maven

      # ① 编译 + 单元测试
      - name: Maven verify
        run: mvn -B -ntp clean verify

      # ② docker 打包验证（与 staging 的 docker compose build 等价）
      - name: Docker build
        run: docker build -t ${{ github.event.repository.name }}:ci .
