# AWSomeShop 一键编排 — Unit 7（基础设施/部署）
# 已对齐各服务 application-docker.yml 的约定：
#   - 激活 profile: SPRING_PROFILES_ACTIVE=docker
#   - DB 变量: DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD
#   - Redis 变量: REDIS_HOST/REDIS_PORT
#   - 容器内端口统一 8081（docker profile 的 server.port）
#   - 库名（下划线，注意 point 单数，gateway 亦有独立库）：
#       awsome_shop_auth / awsome_shop_product / awsome_shop_point / awsome_shop_order / awsome_shop_gateway
name: awsomeshop

services:
  # ---------- 数据库 ----------
  mysql:
    image: mysql:8.4
    container_name: awsomeshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 官方入口自动创建 auth 库与共享应用账号；其余 4 个库由 init 脚本创建并授权
      MYSQL_DATABASE: awsome_shop_auth
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [awsomeshop-net]
    # 调试时可暴露（默认不对宿主开放）
    # ports: ["3306:3306"]

  # ---------- 缓存 ----------
  redis:
    image: redis:7.4-alpine
    container_name: awsomeshop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [awsomeshop-net]
    # ports: ["6379:6379"]

  # ---------- 业务服务（源码就绪后可构建）----------
  # 公共约定：profile=docker、容器端口 8081、DB_*/REDIS_* 变量、共享应用账号
  auth-service:
    build: ../awsome-shop-auth-service
    container_name: awsomeshop-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: awsome_shop_auth
      DB_USERNAME: ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TZ: ${TZ}
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [awsomeshop-net]

  product-service:
    build: ../awsome-shop-product-service
    container_name: awsomeshop-product
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: awsome_shop_product
      DB_USERNAME: ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TZ: ${TZ}
    volumes:
      - product-images:/app/uploads   # 图片卷由商品服务独占
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [awsomeshop-net]

  points-service:
    build: ../awsome-shop-points-service
    container_name: awsomeshop-points
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: awsome_shop_point
      DB_USERNAME: ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ONBOARDING_POINTS: ${ONBOARDING_POINTS}
      TZ: ${TZ}
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [awsomeshop-net]

  order-service:
    build: ../awsome-shop-order-service
    container_name: awsomeshop-order
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: awsome_shop_order
      DB_USERNAME: ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TZ: ${TZ}
      # ⚠️ 待修复（order 仓）：order 调用 product/points 的下游地址未在 docker profile 配置，
      #    需在 order 仓 application-docker.yml 增加下游 URL（指向 http://product-service:8081 等）。
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      product-service: { condition: service_started }
      points-service: { condition: service_started }
    networks: [awsomeshop-net]

  api-gateway:
    build: ../awsome-shop-gateway-service
    container_name: awsomeshop-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: awsome_shop_gateway
      DB_USERNAME: ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TZ: ${TZ}
      # ⚠️ 待修复（gateway 仓）：路由(routes)与下游地址(gateway.services.*)仅在 application-local.yml，
      #    docker profile 缺失 → 容器内网关无路由。需在 gateway 仓 application-docker.yml 补：
      #    gateway.services.auth=http://auth-service:8081 / product=http://product-service:8081 /
      #    point=http://points-service:8081 / order=http://order-service:8081 + 对应 routes。
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      product-service: { condition: service_started }
      points-service: { condition: service_started }
      order-service: { condition: service_started }
    networks: [awsomeshop-net]

  # 前端构建产物输出到共享卷，供 nginx 提供
  frontend:
    build: ../awsome-shop-frontend
    container_name: awsomeshop-frontend
    restart: "no"   # 一次性导出容器：复制产物后退出
    command: ["sh", "-c", "cp -r /app/dist/. /export/ && echo 'frontend assets exported'"]
    volumes:
      - frontend-dist:/export
    networks: [awsomeshop-net]

  # ---------- 唯一对外入口 ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: awsomeshop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/origin-guard:/etc/nginx/origin-guard:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      frontend: { condition: service_completed_successfully }
      api-gateway: { condition: service_started }
    networks: [awsomeshop-net]

networks:
  awsomeshop-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  product-images:
  frontend-dist:
