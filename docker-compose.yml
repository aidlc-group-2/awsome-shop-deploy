# AWSomeShop 一键编排 — Unit 7（基础设施/部署）
# 说明：
#  - MySQL / Nginx 使用官方镜像；6 个业务服务用 build 指向同级源码目录（Q2=C / Q3=A）
#  - 当前仅 Unit 7 就绪，业务服务源码目录尚不存在，`up --build` 在 build 业务服务时会失败（预期）
#  - 可先单独启动 mysql / nginx 做独立验证：docker compose up -d mysql
name: awsomeshop

services:
  # ---------- 数据库 ----------
  mysql:
    image: mysql:8.4
    container_name: awsomeshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 由官方入口自动创建 auth schema 与共享应用账号；其余 3 个 schema 由 init SQL 创建
      MYSQL_DATABASE: awsomeshop_auth
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [awsomeshop-net]
    # 调试时可暴露（默认不对宿主开放）
    # ports: ["3306:3306"]

  # ---------- 业务服务（源码就绪后可构建）----------
  auth-service:
    build: ../awsome-shop-auth-service
    container_name: awsomeshop-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/awsomeshop_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=${TZ}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_DOMAIN_WHITELIST: ${EMAIL_DOMAIN_WHITELIST}
      TZ: ${TZ}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [awsomeshop-net]

  product-service:
    build: ../awsome-shop-product-service
    container_name: awsomeshop-product
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/awsomeshop_product?useUnicode=true&characterEncoding=utf8&serverTimezone=${TZ}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: ${TZ}
    volumes:
      - product-images:/app/uploads   # 图片卷由商品服务独占（Q6=A）
    depends_on:
      mysql: { condition: service_healthy }
    networks: [awsomeshop-net]

  points-service:
    build: ../awsome-shop-points-service
    container_name: awsomeshop-points
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/awsomeshop_points?useUnicode=true&characterEncoding=utf8&serverTimezone=${TZ}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      ONBOARDING_POINTS: ${ONBOARDING_POINTS}
      TZ: ${TZ}
    depends_on:
      mysql: { condition: service_healthy }
    networks: [awsomeshop-net]

  order-service:
    build: ../awsome-shop-order-service
    container_name: awsomeshop-order
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/awsomeshop_order?useUnicode=true&characterEncoding=utf8&serverTimezone=${TZ}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      PRODUCT_SERVICE_URL: http://product-service:8002
      POINTS_SERVICE_URL: http://points-service:8003
      TZ: ${TZ}
    depends_on:
      mysql: { condition: service_healthy }
      product-service: { condition: service_started }
      points-service: { condition: service_started }
    networks: [awsomeshop-net]

  api-gateway:
    build: ../awsome-shop-api-gateway
    container_name: awsomeshop-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      POINTS_SERVICE_URL: http://points-service:8003
      ORDER_SERVICE_URL: http://order-service:8004
      TZ: ${TZ}
    depends_on:
      auth-service: { condition: service_started }
      product-service: { condition: service_started }
      points-service: { condition: service_started }
      order-service: { condition: service_started }
    networks: [awsomeshop-net]

  # 前端构建产物输出到共享卷，供 nginx 提供（交接契约见 README）
  frontend:
    build: ../awsome-shop-frontend
    container_name: awsomeshop-frontend
    # 约定：前端镜像将构建产物置于 /export，启动时复制到共享卷后退出
    command: ["sh", "-c", "cp -r /app/dist/. /export/ && echo 'frontend assets exported'"]
    volumes:
      - frontend-dist:/export
    networks: [awsomeshop-net]

  # ---------- 唯一对外入口 ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: awsomeshop-nginx
    restart: unless-stopped
    ports:
      - "80:80"   # 唯一对宿主暴露的端口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      api-gateway: { condition: service_started }
    networks: [awsomeshop-net]

networks:
  awsomeshop-net:
    driver: bridge

volumes:
  mysql-data:
  product-images:
  frontend-dist:
