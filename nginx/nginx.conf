# AWSomeShop Nginx — Unit 7
# 单一对外入口：托管前端 SPA 静态资源 + 反代 /api 到 API 网关（Q8=A）
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10m;   # 允许商品图片上传

    server {
        listen 80;
        server_name _;

        # Docker 内置 DNS，运行时解析上游（避免网关未就绪时 nginx 启动失败）
        resolver 127.0.0.11 valid=30s ipv6=off;

        root /usr/share/nginx/html;   # 前端构建产物（来自 frontend-dist 卷）
        index index.html;

        # SPA 路由回退
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 反代到网关
        # 用变量 + rewrite 推迟上游解析到请求时：
        #   rewrite 剥离 /api 前缀，/api/auth/login → 网关收到 /auth/login。
        #   若网关本身期望保留 /api 前缀，删除下面的 rewrite 行即可。
        location /api/ {
            set $gateway http://api-gateway:8080;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # 健康检查
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
}
